<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 20px; color: #6366f1; }
        .card { background: #16161d; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #333; }
        .card h2 { font-size: 14px; color: #888; text-transform: uppercase; margin-bottom: 12px; }
        .amount { font-size: 36px; font-weight: 700; }
        .green { color: #10b981; }
        .red { color: #ef4444; }
        .btn { width: 100%; padding: 16px; background: #6366f1; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; margin-bottom: 12px; cursor: pointer; }
        .btn-secondary { background: #1e1e28; }
        input { width: 100%; padding: 14px; background: #0a0a0f; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 16px; margin-bottom: 12px; }
        .list-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: #16161d; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; background: #1e1e28; border: none; border-radius: 8px; color: #888; font-weight: 600; cursor: pointer; }
        .tab.active { background: #6366f1; color: #fff; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat { background: #1e1e28; padding: 16px; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 12px; color: #888; }
        .stat-value { font-size: 20px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Finance Tracker</h1>
        
        <div class="card">
            <h2>Net Worth</h2>
            <div class="amount green" id="netWorth">$0</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat">
                <div class="stat-label">Income</div>
                <div class="stat-value green" id="totalIncome">$0</div>
            </div>
            <div class="stat">
                <div class="stat-label">Expenses</div>
                <div class="stat-value red" id="totalExpenses">$0</div>
            </div>
        </div>
        
        <div style="margin-top: 20px;">
            <button class="btn" onclick="openModal('income')">💵 Add Income</button>
            <button class="btn btn-secondary" onclick="openModal('expense')">🛒 Add Expense</button>
            <button class="btn btn-secondary" onclick="openModal('investment')">📈 Add Investment</button>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <h2>Recent Transactions</h2>
            <div id="transactions"></div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 20px;">Add</h2>
            <input type="number" id="amount" placeholder="Amount ($)">
            <input type="text" id="description" placeholder="Description">
            <button class="btn" onclick="save()">Save</button>
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
    </div>
    
    <script>
        let data = { income: [], expenses: [], investments: [] };
        let currentType = '';
        
        function load() {
            const saved = localStorage.getItem('financeData');
            if (saved) data = JSON.parse(saved);
            render();
        }
        
        function saveData() {
            localStorage.setItem('financeData', JSON.stringify(data));
            render();
        }
        
        function render() {
            const income = data.income.reduce((a,b) => a + b.amount, 0);
            const expenses = data.expenses.reduce((a,b) => a + b.amount, 0);
            const investments = data.investments.reduce((a,b) => a + (b.amount || 0), 0);
            
            document.getElementById('netWorth').textContent = '$' + (income - expenses + investments).toLocaleString();
            document.getElementById('totalIncome').textContent = '$' + income.toLocaleString();
            document.getElementById('totalExpenses').textContent = '$' + expenses.toLocaleString();
            
            const all = [...data.income.map(i => ({...i, type: 'income'})].concat(...data.expenses.map(e => ({...e, type: 'expense'})));
            all.sort((a,b) => new Date(b.date) - new Date(a.date));
            
            const list = document.getElementById('transactions');
            if (all.length === 0) {
                list.innerHTML = '<p style="color:#666;text-align:center;">No transactions yet</p>';
            } else {
                list.innerHTML = all.slice(0,10).map(t => `
                    <div class="list-item">
                        <div>
                            <div style="font-weight:600">${t.desc || 'Transaction'}</div>
                            <div style="font-size:12px;color:#666">${new Date(t.date).toLocaleDateString()}</div>
                        </div>
                        <div style="font-weight:700;${t.type === 'income' ? 'color:#10b981' : 'color:#ef4444'}">
                            ${t.type === 'income' ? '+' : '-'}$${t.amount.toLocaleString()}
                        </div>
                    </div>
                `).join('');
            }
        }
        
        function openModal(type) {
            currentType = type;
            document.getElementById('modalTitle').textContent = type === 'income' ? 'Add Income' : type === 'expense' ? 'Add Expense' : 'Add Investment';
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        
        function save() {
            const amount = parseFloat(document.getElementById('amount').value);
            const desc = document.getElementById('description').value;
            if (!amount) return alert('Enter amount');
            
            if (currentType === 'income') data.income.push({ amount, desc, date: new Date().toISOString() });
            else if (currentType === 'expense') data.expenses.push({ amount, desc, date: new Date().toISOString() });
            else data.investments.push({ amount, desc, date: new Date().toISOString() });
            
            saveData();
            closeModal();
        }
        
        load();
    </script>
</body>
</html>
